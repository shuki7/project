{% extends "base.html" %}
{% block title %}{{ title }} — {{ company_name }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ title }}</h1>
  <a href="{{ url_for('web.categories_list') }}" class="btn btn-edit">← 一覧に戻る</a>
</div>

<div class="card" style="max-width:480px;">
  <form method="post">

    <div class="form-group">
      <label for="name">カテゴリ名 <span style="color:#c1121f;">*</span></label>
      <input type="text" id="name" name="name"
             value="{{ category.get('name', '') }}" required
             placeholder="例: 交通費"
             autofocus>
    </div>

    <div style="display:flex; gap:.75rem; margin-top:1.5rem;">
      <button type="submit" class="btn btn-success">保存する</button>
      <a href="{{ url_for('web.categories_list') }}" class="btn btn-edit">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
